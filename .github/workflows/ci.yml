name: AdaptiveGEMM CI

on:
  push:
    branches:
      - public-release
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build on CUDA container
    runs-on: ubuntu-latest
    container:
      image: nvidia/cuda:12.6.2-devel-ubuntu22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y cmake ninja-build g++
      - name: Install Python deps
        run: |
          apt-get install -y python3 python3-dev python3-pip
          python3 -m pip install --upgrade pip
          python3 -m pip install pytest numpy
      - name: Configure
        run: cmake -S public_release -B public_release/build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: |
          cmake --build public_release/build --target adaptive_gemm_demo adaptive_gemm_precision_test adaptive_gemm_py
      - name: Run Python tests
        run: |
          python3 -m pytest public_release/tests/python -q

  gpu-validate:
    name: Run precision test on GPU runner
    needs: build
    runs-on: [self-hosted, linux, gpu]
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S public_release -B public_release/build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build public_release/build --target adaptive_gemm_precision_test
      - name: Precision test
        run: ctest --test-dir public_release/build -C Release --output-on-failure
